name: Governance Console E2E

on:
  pull_request:
    paths:
      - "governance-console/**"
      - ".github/workflows/governance-console-e2e.yml"
  push:
    branches: [main, "cursor/**"]
    paths:
      - "governance-console/**"
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Governance engine unit tests
        run: |
          cd governance-console/backend
          pip install -r requirements.txt pytest
          PYTHONPATH=. python -m pytest tests -q

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    defaults:
      run:
        working-directory: governance-console
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose full stack E2E
        run: python3 ../scripts/report_slo_health_v1.py --scope governance-console-e2e --budget-seconds 900 -- bash -lc 'cd governance-console && make e2e'
