# NOOS GHA secondary witness — autorun registry critique (read-only, no loop dispatch).
name: NOOS autorun witness

on:
  workflow_dispatch:
  # Demoted from */30 — witness-on-witness churn without customer beneficiary.
  # Weekly freshness check is enough for autorun registry critique.
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  actions: read

concurrency:
  group: noos-autorun-witness-${{ github.ref }}
  cancel-in-progress: false

jobs:
  witness:
    name: Autorun status witness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read
    env:
      NOOS_GHA_WITNESS: "1"
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
      NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Autorun status critique
        run: |
          set -euo pipefail
          mkdir -p receipts/proof
          rc=0
          python3 scripts/autorun_status_v1.py --json | tee receipts/proof/noos-autorun-witness-v1.json || rc=$?
          test -s receipts/proof/noos-autorun-witness-v1.json
          echo "WITNESS_RC=${rc}" >> "$GITHUB_ENV"

      - name: Commit witness receipt to main
        if: always()
        run: |
          set -euo pipefail
          git config user.name "noos-witness-bot"
          git config user.email "noos-witness-bot@users.noreply.github.com"
          git add receipts/proof/noos-autorun-witness-v1.json
          if git diff --cached --quiet; then
            echo "No receipt change to commit."
          else
            git commit -m "witness: noos-autorun-witness receipt $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            for attempt in 1 2 3; do
              if git pull --rebase --autostash origin main && git push origin HEAD:main; then
                echo "Receipt pushed to main (attempt ${attempt})."
                break
              fi
              if [ "${attempt}" -eq 3 ]; then
                echo "Receipt push failed after 3 attempts." >&2
                exit 1
              fi
              sleep 7
            done
          fi

      - name: Upload autorun witness receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noos-autorun-witness-v1
          path: receipts/proof/noos-autorun-witness-v1.json
          retention-days: 30
          if-no-files-found: warn

      - name: Fail run on red witness verdict
        if: always()
        run: |
          rc="${WITNESS_RC:-1}"
          echo "Witness exit code: ${rc}"
          exit "${rc}"
