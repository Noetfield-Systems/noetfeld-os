name: GEL CI

# Lane separation (Track C C9):
# - This workflow: public CI on push/PR — pytest, gate, agent docs, SBOM (no secrets).
# - noos-factory-autorun.yml: factory loop + Supabase sink (repository secrets).
# - CF noos-factory-autorun-tick-v1: cron → repository_dispatch (not PR CI).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: gel-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Agent vault tags
        run: bash scripts/check_noos_agent_docs.sh

      - name: Pytest
        run: pytest -q
        continue-on-error: false
      - name: Run autorun unit tests
        run: pytest -q tests/test_autorun_findings.py
        continue-on-error: false

      - name: Integration gate (UPG-0159)
        run: pytest -q tests/test_gate_integration_ci.py

      - name: Integration decide local server (UPG-0160)
        run: pytest -q tests/test_decide_integration_ci.py

      - name: Loop determinism external-verify (UPG-0214 / L13)
        run: python3 scripts/verify_loop_determinism_external_v1.py --write-receipt --json

      - name: Living-system governance (GHA + Copilot + integrator + automations)
        run: python3 scripts/verify_living_system_governance_v1.py --json

      - name: Machine loops E2E verify
        run: python3 scripts/noos_machine_loops_v1.py --json verify

      - name: noetfield gate (local)
        run: noetfield gate --json

      - name: Business strategy alignment (UPG-0193)
        run: bash scripts/check_noetfield_business_strategy.sh

      - name: Gitleaks secret scan (UPG-0197)
        # gitleaks/gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for
        # organization-owned repos (noetfeld-os moved from a personal account
        # to the Noetfield-Systems org). The gitleaks CLI itself stays free
        # and open-source, so run it directly instead of the licensed action.
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            LOG_OPTS="--no-merges --first-parent"
          else
            LOG_OPTS="--no-merges --first-parent ${BEFORE_SHA}..${{ github.sha }}"
          fi

          ./gitleaks detect --redact -v --exit-code=1 --report-format=sarif --report-path=results.sarif --log-opts="${LOG_OPTS}"
          rm -f gitleaks gitleaks.tar.gz

      - name: Upload gitleaks SARIF (UPG-0197)
        if: github.event_name == 'push' && always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results.sarif
          path: results.sarif
          if-no-files-found: ignore

      - name: SBOM + pip-audit (UPG-0196)
        run: |
          pip install pip-audit cyclonedx-bom
          pip-audit -r requirements.txt || true
          cyclonedx-py requirements -o sbom-cyclonedx.json requirements.txt
          test -f sbom-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json
          if-no-files-found: warn
