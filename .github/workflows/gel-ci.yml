name: GEL CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Agent vault tags
        run: bash scripts/check_noos_agent_docs.sh

      - name: Pytest
        run: pytest -q

      - name: noetfield gate (local)
        run: noetfield gate
