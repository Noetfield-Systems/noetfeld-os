name: Cost policy scan

on:
  push:
    branches: [ "**" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run cost policy scanner
        run: |
          python3 scripts/cost_policy_scan.py --policy data/cost_policy_machine.json
