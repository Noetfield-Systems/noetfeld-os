name: Noetfield WWW CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "assets/**"
      - "scripts/generate_sitemap.py"
      - "scripts/audit_public_site_health.py"
      - "sitemap.xml"
      - ".github/workflows/noetfield-www-ci.yml"
  pull_request:
    paths:
      - "**/*.html"
      - "assets/**"
      - "scripts/generate_sitemap.py"
      - "scripts/audit_public_site_health.py"
      - "sitemap.xml"

jobs:
  www-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify sitemap structure committed
        run: python3 scripts/verify_sitemap_committed.py

      - name: Public site health
        run: make site-health
