name: NOOS loop — agent nerve

on:
  schedule:
    - cron: "0 * * * *"
  repository_dispatch:
    types: [noos_agent_nerve_loop_tick]

permissions:
  contents: read

concurrency:
  group: noos-loop-agent-nerve
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt && pip install -e .
      - name: Run 24/7 agent nerve loop
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: python3 scripts/noos_loop_runner_v1.py --event-type noos_agent_nerve_loop_tick --json
