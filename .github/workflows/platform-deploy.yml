name: Platform CI (deploy-ready)

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "infrastructure/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/platform-deploy.yml"
  pull_request:
    paths:
      - "services/**"
      - "packages/**"
      - "infrastructure/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Deploy smoke (ephemeral API)
        env:
          RUNTIME_EVENT_STORE: memory
          PYTHONPATH: .:packages/types:packages/config:services/events:services/ledger:services/graph:services/governance:services/signals:services/workflow:services/ai-runtime:services/inspectors:services/identity:services/copilot-governance:services/factories:services/trust-brief:services/legal-review:services/aml-trace
        run: python3 scripts/report_slo_health_v1.py --scope platform-deploy --budget-seconds 300 -- ./scripts/deploy_platform_smoke.sh

  # Production deploy: wire your host (Fly, ECS, VM) here when secrets are available.
