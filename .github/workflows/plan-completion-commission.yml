name: Plan-completion commission + Railway sync

on:
  workflow_dispatch:
  push:
    branches:
      - fix/plan-completion-live-commission
    paths:
      - "scripts/noos_plan_completion_*.py"
      - "scripts/noos_unified_backlog_compiler_v1.py"
      - ".github/workflows/sync-plan-completion-railway-env.yml"
      - ".github/workflows/plan-completion-commission.yml"

permissions:
  contents: read

jobs:
  sync-railway:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Sync Runway supervision env to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          NOETFIELD_RUNWAY_API_SECRET: ${{ secrets.NOETFIELD_RUNWAY_API_SECRET }}
          NOETFIELD_RUNWAY_API_URL: ${{ secrets.NOETFIELD_RUNWAY_API_URL }}
          NOETFIELD_RUNWAY_API_KEY_ID: ${{ secrets.NOETFIELD_RUNWAY_API_KEY_ID }}
        run: |
          set -euo pipefail
          TOKEN="${RAILWAY_TOKEN:-${RAILWAY_API_TOKEN:-}}"
          test -n "$TOKEN"
          test -n "${NOETFIELD_RUNWAY_API_SECRET:-}"
          export RAILWAY_TOKEN="$TOKEN"
          export RAILWAY_API_TOKEN="$TOKEN"
          URL="${NOETFIELD_RUNWAY_API_URL:-https://noetfield-runway-runtime-api-staging.sina-kazemnezhad-ca.workers.dev}"
          KEY_ID="${NOETFIELD_RUNWAY_API_KEY_ID:-staging-proof}"
          curl -fsSL https://github.com/railwayapp/cli/releases/download/v5.27.2/railway-v5.27.2-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin railway
          railway link --project noetfield-platform --environment production --service noos-loop-runner
          railway variable set "NOETFIELD_RUNWAY_API_URL=${URL}" --service noos-loop-runner --skip-deploys
          railway variable set "NOETFIELD_RUNWAY_API_SECRET=${NOETFIELD_RUNWAY_API_SECRET}" --service noos-loop-runner --skip-deploys
          railway variable set "NOETFIELD_RUNWAY_API_KEY_ID=${KEY_ID}" --service noos-loop-runner --skip-deploys
          railway variable set "NOOS_PLAN_COMPLETION_LIVE_INTAKE=1" --service noos-loop-runner --skip-deploys
          railway variable set "NOOS_PLAN_COMPLETION_TELEGRAM=1" --service noos-loop-runner --skip-deploys
          echo "OK: Railway env set"
          railway redeploy --service noos-loop-runner --yes || true

  commission-proof:
    runs-on: ubuntu-latest
    needs: sync-railway
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pytest + commission harness
        env:
          NOETFIELD_RUNWAY_API_URL: ${{ secrets.NOETFIELD_RUNWAY_API_URL }}
          NOETFIELD_RUNWAY_API_SECRET: ${{ secrets.NOETFIELD_RUNWAY_API_SECRET }}
          NOETFIELD_RUNWAY_API_KEY_ID: ${{ secrets.NOETFIELD_RUNWAY_API_KEY_ID }}
          NOOS_PLAN_COMPLETION_LIVE_INTAKE: "1"
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          python3 -m pip install -q pytest
          python3 -m pytest tests/test_noos_plan_completion_v1.py -q
          python3 scripts/noos_plan_completion_commission_v1.py | tee /tmp/commission.json
          python3 - <<'PY'
          import json
          row=json.load(open("/tmp/commission.json"))
          assert row.get("ok") is True, row
          assert row.get("drain",{}).get("idle") is True, row
          print("COMMISSION_OK", row.get("verdict"), row.get("report_line"))
          PY
      - name: Upload commissioning receipt
        uses: actions/upload-artifact@v4
        with:
          name: plan-completion-commissioning
          path: receipts/proof/noos-plan-completion-commissioning-*.json
