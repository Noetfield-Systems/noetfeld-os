name: Publish PyPI

# Manual TestPyPI/prod dispatch only. Tag releases use release-noetfield-gate.yml (UPG-0163).
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: prod
        type: choice
        options:
          - test
          - prod

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'prod' && 'pypi' || 'testpypi' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Test gate package
        run: python -m pytest -q tests/test_noetfield_gate.py

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Publish to TestPyPI (trusted publishing)
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'test'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Publish to PyPI (trusted publishing)
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'prod'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
