name: Phase 3 Runtime Verification

on:
  pull_request:
    paths:
      - "services/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "infrastructure/supabase/**"
      - "pyproject.toml"
      - ".github/workflows/phase-3-runtime.yml"
  workflow_dispatch:

jobs:
  backend-runtime:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: noetfield
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d noetfield"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/noetfield
      RUNTIME_EVENT_STORE: postgres
      PYTHONPATH: .:packages/types:packages/config:packages/sdk:services/events:services/ledger:services/graph:services/governance:services/signals:services/workflow:services/ai-runtime:services/inspectors:services/identity:services/copilot-governance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile backend
        run: python -m compileall packages services scripts

      - name: Apply PostgreSQL migrations
        run: python scripts/apply_postgres_migrations.py

      - name: Run memory smoke
        env:
          RUNTIME_EVENT_STORE: memory
        run: python scripts/phase_3_2_backend_smoke.py

      - name: Run PostgreSQL smoke
        run: python scripts/phase_3_2_backend_smoke.py --postgres

      - name: Run pytest verification (unit, in-memory runtime)
        env:
          RUNTIME_EVENT_STORE: memory
        run: pytest tests/unit -q

      - name: Ecosystem smoke (chat, telegram, intake)
        env:
          RUNTIME_EVENT_STORE: memory
        run: make ecosystem-health

      - name: Verify health endpoints (ephemeral API)
        env:
          RUNTIME_EVENT_STORE: memory
          PYTHONPATH: .:packages/types:packages/config:packages/sdk:services/events:services/ledger:services/graph:services/governance:services/signals:services/workflow:services/ai-runtime:services/inspectors:services/identity:services/copilot-governance
        run: |
          uvicorn noetfield_governance.api:app --host 127.0.0.1 --port 8001 --app-dir services/governance &
          sleep 4
          PLATFORM_HEALTH_BASE=http://127.0.0.1:8001 python3 scripts/verify_platform_health.py
          kill %1 || true

      - name: Run PostgreSQL integration verification
        run: pytest tests/integration/test_phase_3_3_postgres_runtime.py -q
