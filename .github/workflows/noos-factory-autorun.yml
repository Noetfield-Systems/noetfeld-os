name: NOOS factory autorun

# Schedule: GitHub cron */10 UTC on main.
# Bridge: repository_dispatch type noos_factory_autorun_tick (CF cron → GitHub API).
# No workflow_dispatch — zero manual Cursor triggers.
on:
  schedule:
    # Explicit UTC minutes — some private repos ignore */10 until re-enabled.
    - cron: "0,10,20,30,40,50 * * * *"
  repository_dispatch:
    types: [noos_factory_autorun_tick]

permissions:
  contents: read

concurrency:
  group: noos-factory-autorun
  cancel-in-progress: false

jobs:
  factory-autorun:
    name: Factory autorun (10-min cycle)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          echo "github_event=${{ github.event_name }}"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Verify required secrets (presence only)
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
          NOETFIELD_SUPABASE_DATABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_DATABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          NOETFIELD_API_KEY: ${{ secrets.NOETFIELD_API_KEY }}
        run: |
          python3 - <<'PY'
          import os
          import sys

          required = (
              "NOETFIELD_SUPABASE_URL",
              "NOETFIELD_SUPABASE_SERVICE_ROLE_KEY",
          )
          optional = (
              "NOETFIELD_SUPABASE_DATABASE_URL",
              "SUPABASE_DB_PASSWORD",
              "NOETFIELD_API_KEY",
          )
          for name in required + optional:
              print(f"{name}={'YES' if os.environ.get(name) else 'NO'}")
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print("ERROR: missing required secrets:", ", ".join(missing))
              sys.exit(1)
          PY

      - name: Enqueue cloud worker inbox
        continue-on-error: true
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
          NOETFIELD_SUPABASE_DATABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_DATABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python3 scripts/enqueue_noos_cloud_inbox_v1.py

      - name: Factory cycle (once)
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
          NOETFIELD_SUPABASE_DATABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_DATABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          NOETFIELD_API_URL: https://api.noetfield.com
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: make autorun-once

      - name: Verify Supabase factory cycle sink
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from pathlib import Path

          runtime_state = Path(".noos-runtime/factory/execution/noetfield_factory_state_v1.json")
          if runtime_state.is_file():
              state = json.loads(runtime_state.read_text(encoding="utf-8"))
              cycle_status = state.get("last_cycle_result", {}).get("status")
              sink = state.get("supabase_sink", {})
              print(f"factory_cycle_status={cycle_status}")
              print(f"supabase_sink_ok={sink.get('ok')}")
              if cycle_status != "ok":
                  print("ERROR: factory cycle did not complete with status=ok")
                  sys.exit(1)
              if not sink.get("ok"):
                  print("ERROR: Supabase sink did not succeed")
                  sys.exit(1)

          base = os.environ["NOETFIELD_SUPABASE_URL"].rstrip("/")
          key = os.environ["NOETFIELD_SUPABASE_SERVICE_ROLE_KEY"]
          headers = {
              "apikey": key,
              "Authorization": f"Bearer {key}",
              "Prefer": "count=exact",
          }
          req = urllib.request.Request(
              f"{base}/rest/v1/noetfield_factory_cycle_runs?select=cycle_number,status,recorded_at&order=recorded_at.desc&limit=1",
              headers=headers,
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              latest = json.loads(resp.read().decode("utf-8"))
          if not latest or latest[0].get("status") != "ok":
              print("ERROR: latest Supabase factory cycle is missing or not ok")
              sys.exit(1)
          print(f"latest_supabase_cycle={latest[0]}")

          req = urllib.request.Request(
              f"{base}/rest/v1/noetfield_factory_cycle_runs?select=id",
              headers=headers,
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              count = resp.headers.get("Content-Range", "*/0").split("/")[-1]
          print(f"supabase_factory_cycle_count={count}")

          req = urllib.request.Request(
              f"{base}/rest/v1/noetfield_factory_cycle_runs"
              "?select=recorded_at,runner_output"
              "&runner_output->>cloud_trigger=in.(schedule,repository_dispatch)"
              "&order=recorded_at.desc&limit=1",
              headers=headers,
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  scheduled = json.loads(resp.read().decode("utf-8"))
              if scheduled:
                  print(f"latest_autonomous_receipt={scheduled[0]}")
              else:
                  print("latest_autonomous_receipt=none_yet")
          except urllib.error.HTTPError:
              print("latest_autonomous_receipt=query_unavailable")
          PY
