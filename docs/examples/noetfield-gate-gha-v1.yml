# GitHub Actions — `noetfield gate` before agent job (UPG-0168)

Run the chain gate before any agent or deploy job so policy, sqlite, and optional API readiness pass first.

```yaml
name: Agent job with gate

on:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install noetfield-gate
      - name: noetfield gate
        run: noetfield gate
        env:
          NOETFIELD_API_URL: https://api.noetfield.com

  agent:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run agent (example)
        run: echo "agent runs only after gate PASS"
```

Exit code `0` = PASS; non-zero fails the workflow before downstream jobs run.
