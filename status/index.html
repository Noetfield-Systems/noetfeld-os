<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Noetfield — Platform Status</title>
 <meta name="description" content="Operational status for Noetfield www and platform API." />
 <meta name="robots" content="index,follow" />
 <link rel="canonical" href="https://www.noetfield.com/status/" />
 <link rel="icon" href="/noetfield-favicon-512.png" type="image/png" />
 <link rel="stylesheet" href="/assets/noetfield-tokens.css" />
 <link rel="stylesheet" href="/assets/noetfield-shell.css" />
 <link rel="stylesheet" href="/assets/noetfield-components.css" />
 <link rel="stylesheet" href="/assets/noetfield-sales.css" />
 <script src="/assets/noetfield-shell.js" defer></script>
</head>
<body>
 <div class="bg" aria-hidden="true"></div>
 <a class="skip" href="#main">Skip to content</a>
 <header id="nfHeader"></header>
 <main id="main" class="wrap nf-page">
 <header class="nf-hero">
 <p class="nf-eyebrow">Status</p>
 <h1>Platform status</h1>
 <p class="nf-lead">Live checks against the Noetfield platform API. Governance evaluation only — not payments or custody.</p>
 </header>

 <section class="nf-status-panel" id="statusPanel" aria-live="polite">
 <p id="statusSummary" class="ok">Loading…</p>
 <ul id="statusChecks" style="margin:16px 0 0;padding-left:1.2rem;color:var(--muted);"></ul>
 </section>

 <p style="font-size:var(--text-sm);color:var(--muted2);margin-top:24px;">
 <a href="/docs/api/">Governance API</a> · <a href="/privacy/">Privacy</a> · <a href="/terms/">Terms</a>
 </p>
 </main>
 <footer id="nfFooter"></footer>
 <script>
  (function () {
    function apiBase() {
      var host = window.location.hostname;
      if (host === "localhost" || host === "127.0.0.1") return "http://127.0.0.1:18001";
      return "https://platform.noetfield.com";
    }
    var summary = document.getElementById("statusSummary");
    var list = document.getElementById("statusChecks");
    fetch(apiBase() + "/api/status", { credentials: "omit" })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var ok = data.status === "operational";
        summary.textContent = ok ? "All monitored services operational." : "One or more services degraded.";
        summary.className = ok ? "ok" : "warn";
        var items = [
          "API: " + (data.service || "noetfield-platform"),
          "Governance pilot auth: " + (data.governance_pilot_auth_required ? "required" : "open (dev)"),
          "Governance API: /api/v1/governance (production pilots)",
        ];
        var eco = data.ecosystem || {};
        if (eco.website_chat) items.push("Website chat: " + (eco.website_chat.configured ? "configured" : "not configured"));
        if (eco.intake_api) items.push("Intake API: " + (eco.intake_api.enabled ? "enabled" : "disabled"));
        list.innerHTML = items.map(function (t) { return "<li>" + t + "</li>"; }).join("");
      })
      .catch(function () {
        summary.textContent = "Status API unreachable. Check platform.noetfield.com or try again later.";
        summary.className = "warn";
      });
  })();
 </script>
</body>
</html>
