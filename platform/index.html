<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform | Noetfield</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg: #030303;
            --panel: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #00ff9d;
            --border: #1a1a1a;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        nav {
            width: 280px;
            border-right: 1px solid var(--border);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .logo { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 700; }
        
        .menu { display: flex; flex-direction: column; gap: 20px; }
        .menu-item { color: var(--text-dim); cursor: pointer; transition: 0.3s; font-size: 14px; }
        .menu-item:hover { color: var(--accent); }

        /* Main Area */
        main {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        h1 { font-family: 'Space Grotesk'; font-size: 32px; margin: 0; }

        /* Grid System */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
        }

        .card-label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .card-value { font-size: 28px; font-weight: 600; margin-top: 15px; }

        .btn {
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NOETFIELD</div>
        <div class="menu">
            <div class="menu-item" style="color: white;">Dashboard</div>
            <div class="menu-item">Analytics</div>
            <div class="menu-item">API Keys</div>
            <div class="menu-item">Settings</div>
        </div>
    </nav>

    <main>
        <header>
            <h1>Overview</h1>
            <button class="btn">+ Create Deployment</button>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-label">Active Nodes</div>
                <div class="card-value">12 / 14</div>
            </div>
            <div class="card">
                <div class="card-label">Latency</div>
                <div class="card-value">24ms</div>
            </div>
            <div class="card">
                <div class="card-label">Uptime</div>
                <div class="card-value">99.98%</div>
            </div>
        </div>
    </main>

</body>
</html>
