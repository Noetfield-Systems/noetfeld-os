services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: noetfield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - noetfield_postgres:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr=0.0.0.0:8181"]
    ports:
      - "8181:8181"

  ollama:
    # Pin matches docs/strategy/local-ollama-agent-runtime-blueprint.md (>= 0.24.0)
    image: ollama/ollama:0.24.0
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_GPU: "20"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_CTX: "2048"
      OLLAMA_KEEP_ALIVE: "5m"
    volumes:
      - noetfield_ollama:/root/.ollama

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../monitoring/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  noetfield_postgres:
  noetfield_ollama:
