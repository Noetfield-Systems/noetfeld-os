# UPG-0201 — always-on inbox runner (secondary motor; CF fleet remains primary until UPG-0207)
app = "noos-inbox-runner"
primary_region = "yyz"

[build]
  dockerfile = "ops/fly/noos-inbox-runner/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/ready"
    timeout = "5s"

[env]
  NOOS_INBOX_INTERVAL_SEC = "300"
