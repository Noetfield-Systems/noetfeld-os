<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noetfield — Create Workspace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #06080a;
            color: #e8eaed;
            font-family: 'IBM Plex Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .signup-container {
            width: 100%;
            max-width: 440px;
            padding: 40px 36px;
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }

        .nav-dot {
            width: 7px;
            height: 7px;
            background: #00d084;
            border-radius: 50%;
            box-shadow: 0 0 14px #00d084;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .subtitle {
            text-align: center;
            color: #8b949e;
            font-size: 13px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 10px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 13px 16px;
            border-radius: 6px;
            color: #e8eaed;
            font-size: 14px;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: #00d084;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 208, 132, 0.1);
            background: #1f242c;
        }

        /* Premium custom styling for select dropdowns */
        select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%238b949e'><polygon points='0,0 10,0 5,5'/></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #00d084;
            color: #06080a;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: #00e896;
            box-shadow: 0 4px 20px rgba(0, 208, 132, 0.2);
        }

        .footer-link {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #8b949e;
        }

        .footer-link a {
            color: #00d084;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        /* Trust & Security Whisper */
        .compliance-whisper {
            margin-top: 24px;
            font-size: 10px;
            color: #484f58;
            text-align: center;
            max-width: 440px;
            line-height: 1.5;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="nav-logo">
            <div class="nav-dot"></div>
            Noetfield
        </div>

        <h1>Create Workspace</h1>
        <p class="subtitle">Start sending payments in minutes</p>

        <div class="input-group">
            <label>Business Name</label>
            <input type="text" id="business" placeholder="Acme Corp Ltd." required />
        </div>

        <div class="input-group">
            <label>Work Email</label>
            <input type="email" id="email" placeholder="you@company.com" required />
        </div>

        <div class="input-group">
            <label>Operating Country</label>
            <select id="country">
                <option value="CA">🇨🇦 Canada</option>
                <option value="US">🇺🇸 United States</option>
                <option value="AE">🇦🇪 United Arab Emirates</option>
                <option value="IN">🇮🇳 India</option>
                <option value="GB">🇬🇧 United Kingdom</option>
            </select>
        </div>

        <div class="input-group">
            <label>Estimated Monthly Volume (CAD)</label>
            <select id="volume">
                <option value="under50k">Under $50,000</option>
                <option value="50-200k">$50,000 – $200,000</option>
                <option value="200-500k">$200,000 – $500,000</option>
                <option value="500k+">$500,000+</option>
            </select>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a robust password" required />
        </div>

        <button class="btn-primary" onclick="handleSignup()">Create Workspace →</button>

        <div class="footer-link">
            Already have a workspace? <a href="login.html">Sign in</a>
        </div>
    </div>

    <!-- Trust Whisper -->
    <div class="compliance-whisper">
        Secured via bank-grade 256-bit encryption pipelines.<br>
        Operationally optimized to meet Canadian data privacy compliance.
    </div>

    <script>
        function handleSignup() {
            const business = document.getElementById('business').value;
            const email = document.getElementById('email').value;

            if (business && email) {
                alert(`✅ Workspace "${business}" provisioned successfully.\n\nInitializing non-custodial pipelines.`);
                // window.location.href = "../platform/dashboard.html";
            } else {
                alert("Corporate identifiers and business email required.");
            }
        }
    </script>
</body>
</html>
