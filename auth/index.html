<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noetfield — Institutional Auth</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #06080a;
            color: #e8eaed;
            font-family: 'IBM Plex Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            padding: 36px 0 24px;
            letter-spacing: -0.02em;
        }

        .nav-dot {
            width: 7px;
            height: 7px;
            background: #00d084;
            border-radius: 50%;
            box-shadow: 0 0 14px #00d084;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: #090d12;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tab.active {
            color: #00d084;
            background: #0d1117;
            border-bottom: 2px solid #00d084;
        }

        .form-content {
            padding: 32px 36px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 10px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 14px;
            border-radius: 6px;
            color: #e8eaed;
            font-size: 14px;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: #00d084;
            box-shadow: 0 0 0 3px rgba(0, 208, 132, 0.1);
            outline: none;
            background: #1f242c;
        }

        /* Customizing select slightly */
        select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%238b949e'><polygon points='0,0 10,0 5,5'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #00d084;
            color: #06080a;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: #00e896;
            box-shadow: 0 4px 20px rgba(0, 208, 132, 0.2);
        }

        /* OAuth Divider & Button */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #484f58;
            font-size: 11px;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-oauth {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #e8eaed;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s ease;
        }
        .btn-oauth:hover {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.15);
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #8b949e;
        }

        .footer-link a {
            color: #00d084;
            text-decoration: none;
        }
        .footer-link a:hover { text-decoration: underline; }

        /* Trust & Compliance Badge */
        .compliance-whisper {
            margin-top: 24px;
            font-size: 10px;
            color: #484f58;
            text-align: center;
            max-width: 440px;
            line-height: 1.5;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="nav-logo">
            <div class="nav-dot"></div>
            Noetfield
        </div>

        <div class="tabs">
            <div class="tab" id="login-tab" onclick="switchTab(0)">Sign In</div>
            <div class="tab" id="signup-tab" onclick="switchTab(1)">Create Workspace</div>
        </div>

        <div class="form-content" id="login-form" style="display: none;">
            <div class="input-group">
                <label>Work Email</label>
                <input type="email" id="login-email" placeholder="you@company.com" required />
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required />
            </div>
            <button class="btn-primary" onclick="handleLogin()">Sign In →</button>
            
            <div class="divider">or</div>
            <button class="btn-oauth" onclick="handleOAuth()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
                Continue with Google
            </button>

            <div class="footer-link">
                Forgot password? <a href="#">Reset via secure link</a>
            </div>
        </div>

        <div class="form-content" id="signup-form" style="display: none;">
            <div class="input-group">
                <label>Business Name</label>
                <input type="text" id="business" placeholder="Acme Corp Ltd." />
            </div>
            <div class="input-group">
                <label>Work Email</label>
                <input type="email" id="signup-email" placeholder="you@company.com" />
            </div>
            <div class="input-group">
                <label>Operating Country</label>
                <select id="country">
                    <option value="CA">🇨🇦 Canada</option>
                    <option value="US">🇺🇸 United States</option>
                    <option value="AE">🇦🇪 United Arab Emirates</option>
                    <option value="IN">🇮🇳 India</option>
                </select>
            </div>
            <div class="input-group">
                <label>Estimated Monthly Volume (CAD)</label>
                <select id="volume">
                    <option value="under50k">Under $50,000</option>
                    <option value="50-200k">$50,000 – $200,000</option>
                    <option value="200k+">$200,000+</option>
                </select>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Create robust password" />
            </div>
            <button class="btn-primary" onclick="handleSignup()">Create Workspace →</button>
        </div>
    </div>

    <div class="compliance-whisper">
        Secured with bank-grade 256-bit encryption.<br>
        Data infrastructure operationally compliant with PIPEDA guidelines.
    </div>

    <script>
        // Intelligent Routing based on URL Parameters (?mode=signup)
        const urlParams = new URLSearchParams(window.location.search);
        const initialMode = urlParams.get('mode');
        
        function switchTab(tabIndex) {
            document.getElementById('login-tab').classList.toggle('active', tabIndex === 0);
            document.getElementById('signup-tab').classList.toggle('active', tabIndex === 1);
            
            document.getElementById('login-form').style.display = tabIndex === 0 ? 'block' : 'none';
            document.getElementById('signup-form').style.display = tabIndex === 1 ? 'block' : 'none';
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            if (email) {
                alert("✅ Entering Sandbox Workspace...\n\nRedirecting to Noetfield Treasury Control Center.");
                // window.location.href = "../platform/dashboard.html";
            } else {
                alert("Corporate email required.");
            }
        }

        function handleSignup() {
            const business = document.getElementById('business').value;
            const email = document.getElementById('signup-email').value;
            
            if (business && email) {
                alert(`✅ Workspace "${business}" provisioned successfully.\n\nInitializing non-custodial pipelines.`);
                // window.location.href = "../platform/dashboard.html";
            } else {
                alert("Please fill all business identifiers.");
            }
        }

        function handleOAuth() {
            alert("🔒 Secure OAuth Loop:\n\nConnecting identity verification layer...");
        }

        // Initialize based on routing
        if (initialMode === 'signup') {
            switchTab(1);
        } else {
            switchTab(0);
        }
    </script>
</body>
</html>
