# UPG-WWW-001 — platform.noetfield.com governance FastAPI spine (Railway)
# Deploy: ./scripts/deploy-platform-railway.sh

[build]
builder = "DOCKERFILE"
dockerfilePath = "infrastructure/docker/Dockerfile.api"
watchPatterns = ["services/governance/**", "packages/**", "infrastructure/docker/**", "data/chatbot/**", "OFFERINGS_LOCKED.md", "PRODUCT_BRIEF.md"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
