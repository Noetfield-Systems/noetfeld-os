<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noetfield — Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0c0f;
            color: #e8eaed;
            font-family: 'IBM Plex Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 36px;
            background: #111418;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            background: #00d084;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 208, 132, 0.4);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 10px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 16px;
            border-radius: 6px;
            color: #e8eaed;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #00d084;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 208, 132, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #00d084;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #00e896;
            box-shadow: 0 0 24px rgba(0, 208, 132, 0.3);
        }

        .divider {
            margin: 24px 0;
            text-align: center;
            color: #374151;
            font-size: 11px;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,255,255,0.07);
        }

        .google-btn {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.13);
            color: #e8eaed;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .footer-link {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
        }

        .footer-link a {
            color: #00d084;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="nav-logo">
            <div class="nav-dot"></div>
            Noetfield
        </div>

        <h1>Sign In</h1>
        <p class="subtitle">Access your payment workspace</p>

        <div class="input-group">
            <label>Work Email</label>
            <input type="email" id="email" placeholder="you@company.com" />
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button class="btn-primary" onclick="handleLogin()">Sign In →</button>

        <div class="divider">or</div>

        <button class="google-btn">
            <span style="font-size:18px;">G</span>
            Continue with Google
        </button>

        <div class="footer-link">
            Don't have a workspace? <a href="../signup.html">Create one</a>
        </div>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            if (email) {
                alert("✅ Demo Login Successful!\n\n(در نسخه واقعی به داشبورد منتقل می‌شی)");
                // window.location.href = "../platform/dashboard.html";
            } else {
                alert("لطفاً ایمیل خود را وارد کنید.");
            }
        }
    </script>
</body>
</html>
